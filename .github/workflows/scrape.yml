name: Scrape Grain Prices

on:
  schedule:
    - cron: '30 14 * * 1-5'  # 9:30am CT (14:30 UTC) weekdays
    - cron: '0 20 * * 1'     # 2:00pm CT Monday (weekly snapshot)
    - cron: '0 20 * * 2-5'   # 2:00pm CT Tue-Fri
  workflow_dispatch:          # manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          IS_MONDAY: ${{ github.event.schedule == '0 20 * * 1' && 'true' || '' }}
        run: node run.js
